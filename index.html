// Parse "Jan-26" → {month:1, year:2026}
const parseMo = s => { const [m,y] = s.split("-"); const mi = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"].indexOf(m)+1; return {month:mi, year:2000+parseInt(y)}; };

// Is month <= current month? (already clocked)
const isClocked = (moStr) => { const {month,year} = parseMo(moStr); return year < NOW_YEAR || (year === NOW_YEAR && month <= NOW_MONTH); };

// Is month in the same calendar year and after current month? (backlog for current FY)
const isBacklogCurrentFY = (moStr, fy) => { const {month,year} = parseMo(moStr); return year === fy && month > NOW_MONTH; };

// ─── MAIN DASHBOARD ─────────────────────────────────────────────────────────
const Dashboard = function Dashboard() {
  const [region, setRegion] = useState("All");
  const [spoc, setSpoc] = useState("All");
  const [service, setService] = useState("All");
  const [year, setYear] = useState("2026");
  const [view, setView] = useState("Overview");
  const [drill, setDrill] = useState(null);

  const wins = useMemo(() => WINS_RAW.filter(w =>
    (region==="All"||w.region===region) &&
    (spoc==="All"||w.spoc===spoc) &&
    (service==="All"||w.service===service) &&
    (year==="All"||w.year===+year)
  ), [region,spoc,service,year]);

  const allWinsUnfiltered = useMemo(() => WINS_RAW.filter(w =>
    (region==="All"||w.region===region) &&
    (spoc==="All"||w.spoc===spoc) &&
    (service==="All"||w.service===service)
  ), [region,spoc,service]);

  const pipeline = useMemo(() => PIPELINE_RAW.filter(p =>
    (region==="All"||p.region===region) &&
    (spoc==="All"||p.spoc===spoc) &&
    (service==="All"||p.service===service)
  ), [region,spoc,service]);

  const activePipeline = useMemo(() => pipeline.filter(p => ACTIVE_STAGES.includes(p.stage)), [pipeline]);

  const regions = [...new Set(WINS_RAW.map(w=>w.region).concat(PIPELINE_RAW.map(p=>p.region)))].sort();
  const spocs = [...new Set(WINS_RAW.map(w=>w.spoc).concat(PIPELINE_RAW.map(p=>p.spoc)))].filter(s=>s!=="Unassigned").sort();
  const services = [...new Set(WINS_RAW.map(w=>w.service).concat(PIPELINE_RAW.map(p=>p.service)))].sort();
  const years = [...new Set(WINS_RAW.map(w=>w.year))].sort();

  // ─── KPI CALCULATIONS ──────────────────────────────────────────────────
  const totalWins = wins.reduce((s,w)=>s+w.winUSD,0);
  const dealCount = wins.length;
  const grossPipeline = activePipeline.reduce((s,p)=>s+p.oppUSD,0);
  const weightedPipeline = activePipeline.reduce((s,p)=>s+p.weightedUSD,0);
  const proposalCount = activePipeline.filter(p=>p.stage==="Proposal Shared").length;

  // Revenue Clocked to Date: sum of monthly values for months <= current month in the selected FY
  const selectedFY = year !== "All" ? +year : NOW_YEAR;
  const revClocked = useMemo(() => {
    let total = 0;
    allWinsUnfiltered.forEach(w => {
      Object.entries(w.monthly).forEach(([mo,v]) => {
        const p = parseMo(mo);
        if(p.year === selectedFY && p.month <= NOW_MONTH) total += v;
      });
    });
    return total;
  }, [allWinsUnfiltered, selectedFY]);

  // Backlog: future months in the same calendar year (selectedFY)
  const backlogCurrentFY = useMemo(() => {
    let total = 0;
    allWinsUnfiltered.forEach(w => {
      Object.entries(w.monthly).forEach(([mo,v]) => {
        const p = parseMo(mo);
        if(p.year === selectedFY && p.month > NOW_MONTH) total += v;
      });
    });
    return total;
  }, [allWinsUnfiltered, selectedFY]);

  // Budget shortfall by region
  const budgetShortfall = useMemo(() => {
    if(!BUDGET_YEARS.includes(selectedFY)) return null;
    const result = {};
    const regionFilter = region === "All" ? regions : [region];
    let totalBudget = 0, totalClocked = 0, totalBacklog = 0;
    regionFilter.forEach(reg => {
      if(!BUDGET[reg]) return;
      let rc = 0, bl = 0;
      allWinsUnfiltered.filter(w => w.region === reg).forEach(w => {
        Object.entries(w.monthly).forEach(([mo,v]) => {
          const p = parseMo(mo);
          if(p.year === selectedFY && p.month <= NOW_MONTH) rc += v;
          if(p.year === selectedFY && p.month > NOW_MONTH) bl += v;
        });
      });
      result[reg] = { budget: BUDGET[reg], clocked: rc, backlog: bl, shortfall: BUDGET[reg] - rc - bl };
      totalBudget += BUDGET[reg]; totalClocked += rc; totalBacklog += bl;
    });
    result._total = { budget: totalBudget, clocked: totalClocked, backlog: totalBacklog, shortfall: totalBudget - totalClocked - totalBacklog };
    return result;
  }, [allWinsUnfiltered, selectedFY, region, regions]);

  // ─── MONTHLY REVENUE ──────────────────────────────────────────────────
  const startMonth = useMemo(() => {
    if(year !== "All") { return `Jan-${String(+year).slice(2)}`; }
    return "Jan-25";
  }, [year]);

  const monthlyByRegion = useMemo(() => {
    const startIdx = MONTHS_ORDER.indexOf(startMonth);
    const months = MONTHS_ORDER.slice(startIdx >= 0 ? startIdx : 0);
    const m = {};
    months.forEach(mo => { m[mo] = {month:mo}; regions.forEach(r=>{m[mo][r]=0;}); });
    allWinsUnfiltered.forEach(w => {
      Object.entries(w.monthly).forEach(([k,v]) => {
        if(m[k]) m[k][w.region]=(m[k][w.region]||0)+v;
      });
    });
    return months.map(mo=>m[mo]).filter(d => {
      const total = regions.reduce((s,r) => s+(d[r]||0), 0);
      return total !== 0 || MONTHS_ORDER.indexOf(d.month) <= MONTHS_ORDER.indexOf("Dec-26");
    });
  }, [allWinsUnfiltered, regions, startMonth]);

  const monthlyRev = useMemo(() => {
    return monthlyByRegion.map(d => ({
      month: d.month,
      revenue: Math.round(regions.reduce((s,r) => s+(d[r]||0), 0))
    }));
  }, [monthlyByRegion, regions]);

  // ─── BY SERVICE ────────────────────────────────────────────────────────
  const byService = useMemo(() => {
    const m = {};
    wins.forEach(w => { m[w.service] = (m[w.service]||0)+w.winUSD; });
    return Object.entries(m).map(([name,value])=>({name,value:Math.round(value)})).sort((a,b)=>b.value-a.value);
  }, [wins]);

  const byRegion = useMemo(() => {
    const m = {};
    wins.forEach(w => { m[w.region] = (m[w.region]||0)+w.winUSD; });
    return Object.entries(m).map(([name,value])=>({name,value:Math.round(value)})).sort((a,b)=>b.value-a.value);
  }, [wins]);

  // ─── BY SPOC (Primary FT Lead only) ───────────────────────────────────
  const bySPOC = useMemo(() => {
    const m = {};
    wins.forEach(w => {
      const sp = w.spoc;
      if(!m[sp]) m[sp]={wins:0,rev:0,backlog:0,deals:0};
      m[sp].wins+=w.winUSD; m[sp].deals++;
      Object.entries(w.monthly).forEach(([k,v]) => {
        const p = parseMo(k);
        if(p.year === selectedFY && p.month <= NOW_MONTH) m[sp].rev+=v;
        if(p.year === selectedFY && p.month > NOW_MONTH) m[sp].backlog+=v;
      });
    });
    return Object.entries(m).map(([name,d])=>({name,...d})).sort((a,b)=>b.wins-a.wins);
  }, [wins, selectedFY]);

  // ─── PIPELINE CALCULATIONS ─────────────────────────────────────────────
  const pipeByStage = useMemo(() => {
    const m = {};
    pipeline.forEach(p => { if(!m[p.stage]) m[p.stage]={stage:p.stage,count:0,gross:0,weighted:0}; m[p.stage].count++; m[p.stage].gross+=p.oppUSD; m[p.stage].weighted+=p.weightedUSD; });
    return Object.values(m).sort((a,b)=>b.gross-a.gross);
  }, [pipeline]);

  const pipeByService = useMemo(() => {
    const m = {};
    activePipeline.forEach(p => { m[p.service]=(m[p.service]||0)+p.weightedUSD; });
    return Object.entries(m).map(([name,value])=>({name,value:Math.round(value)})).sort((a,b)=>b.value-a.value).filter(d=>d.value>0);
  }, [activePipeline]);

  const topClients = useMemo(() => {
    const m = {};
    wins.forEach(w => { m[w.client] = (m[w.client]||0)+w.winUSD; });
    return Object.entries(m).map(([name,value])=>({name,value:Math.round(value)})).sort((a,b)=>b.value-a.value).slice(0,10);
  }, [wins]);

  // ─── PARTNER PERFORMANCE ───────────────────────────────────────────────
  const byPartner = useMemo(() => {
    const m = {};
    wins.forEach(w => {
      w.partner.split(",").map(s=>s.trim()).forEach(p => {
        if(!m[p]) m[p]={name:p,wins:0,deals:0,pipeGross:0,pipeWeighted:0};
        m[p].wins+=w.winUSD; m[p].deals++;
      });
    });
    activePipeline.forEach(p => {
      p.partner.split(",").map(s=>s.trim()).forEach(pt => {
        if(!m[pt]) m[pt]={name:pt,wins:0,deals:0,pipeGross:0,pipeWeighted:0};
        m[pt].pipeGross+=p.oppUSD; m[pt].pipeWeighted+=p.weightedUSD;
      });
    });
    return Object.values(m).sort((a,b)=>(b.wins+b.pipeWeighted)-(a.wins+a.pipeWeighted));
  }, [wins,activePipeline]);

  // ─── DRILL COLUMN DEFS ────────────────────────────────────────────────
  const DRILL_WIN_COLS = [
    {key:"client",label:"Client"},{key:"desc",label:"Description"},{key:"service",label:"Service"},
    {key:"winUSD",label:"Win Size (USD)",fmt:fmtFull},{key:"currency",label:"Currency"},
    {key:"region",label:"Region"},{key:"location",label:"Location"},
    {key:"spoc",label:"Primary FT Lead"},{key:"partner",label:"Engagement Partner"},
    {key:"year",label:"Win Year"},{key:"winDate",label:"Win Date"},{key:"endDate",label:"End Date"}
  ];
  const DRILL_PIPE_COLS = [
    {key:"client",label:"Client"},{key:"desc",label:"Description"},{key:"service",label:"Service"},
    {key:"stage",label:"Stage"},{key:"oppUSD",label:"Opp Size (USD)",fmt:fmtFull},
    {key:"prob",label:"Probability",fmt:v=>v?`${(v*100).toFixed(0)}%`:'—'},
    {key:"weightedUSD",label:"Weighted (USD)",fmt:fmtFull},
    {key:"region",label:"Region"},{key:"location",label:"Location"},
    {key:"spoc",label:"Primary FT Lead"},{key:"partner",label:"Engagement Partner"},
    {key:"oppDate",label:"Opp Date"}
  ];

  return (
    <div className="min-h-screen bg-gray-50">
      {/* Header */}
      <div className="bg-white border-b border-gray-200 sticky top-0 z-40">
        <div className="max-w-7xl mx-auto px-6 py-4">
          <div className="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">
            <div>
              <h1 className="text-xl font-bold text-gray-900">UNIQUS FT — Leadership Dashboard</h1>
              <p className="text-xs text-gray-500 mt-0.5">Finance Transformation Practice · All values in USD · Data as of Apr 2026</p>
            </div>
            <div className="flex flex-wrap gap-3">
              <Filter label="Region" options={regions} value={region} onChange={setRegion}/>
              <Filter label="Primary FT SPOC" options={spocs} value={spoc} onChange={setSpoc}/>
              <Filter label="Service" options={services} value={service} onChange={setService}/>
              <Filter label="Win Year" options={years} value={year} onChange={setYear}/>
            </div>
          </div>
          <div className="mt-3">
            <Tab tabs={["Overview","Revenue","Pipeline","People","Deals"]} active={view} onChange={setView}/>
          </div>
        </div>
      </div>

      <div className="max-w-7xl mx-auto px-6 py-6">

        {/* ═══════════════ OVERVIEW ═══════════════ */}
        {view==="Overview" && <>
          <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-6">
            <KPI title="Total Wins" value={fmt(totalWins)} sub={`${dealCount} deals`} color="blue" onClick={()=>setDrill({title:"All Wins",data:wins,cols:DRILL_WIN_COLS})}/>
            <KPI title={`Rev Clocked (${selectedFY})`} value={fmt(revClocked)} sub={`Jan–Apr ${selectedFY}`} color="green" onClick={()=>{
              const detail = [];
              allWinsUnfiltered.forEach(w => { let rc=0; Object.entries(w.monthly).forEach(([mo,v])=>{const p=parseMo(mo);if(p.year===selectedFY&&p.month<=NOW_MONTH) rc+=v;}); if(rc!==0) detail.push({...w,revClocked:rc}); });
              setDrill({title:`Revenue Clocked ${selectedFY} (Jan–Apr)`,data:detail.sort((a,b)=>b.revClocked-a.revClocked),cols:[...DRILL_WIN_COLS,{key:"revClocked",label:"Rev Clocked",fmt:fmtFull}]});
            }}/>
            <KPI title={`Backlog (${selectedFY})`} value={fmt(backlogCurrentFY)} sub={`May–Dec ${selectedFY}`} color="purple" onClick={()=>{
              const detail = [];
              allWinsUnfiltered.forEach(w => { let bl=0; Object.entries(w.monthly).forEach(([mo,v])=>{const p=parseMo(mo);if(p.year===selectedFY&&p.month>NOW_MONTH) bl+=v;}); if(bl!==0) detail.push({...w,backlog:bl}); });
              setDrill({title:`Backlog ${selectedFY} (May–Dec)`,data:detail.sort((a,b)=>b.backlog-a.backlog),cols:[...DRILL_WIN_COLS,{key:"backlog",label:"Backlog",fmt:fmtFull}]});
            }}/>
            <KPI title="Active Pipeline (Gross)" value={fmt(grossPipeline)} sub={`${activePipeline.length} opps`} color="amber" onClick={()=>setDrill({title:"Active Pipeline",data:activePipeline,cols:DRILL_PIPE_COLS})}/>
            <KPI title="Weighted Pipeline" value={fmt(weightedPipeline)} color="cyan"/>
            <KPI title="Proposals Out" value={proposalCount} sub={fmt(activePipeline.filter(p=>p.stage==="Proposal Shared").reduce((s,p)=>s+p.oppUSD,0))} color="rose" onClick={()=>setDrill({title:"Proposals Shared",data:activePipeline.filter(p=>p.stage==="Proposal Shared"),cols:DRILL_PIPE_COLS})}/>
          </div>

          {/* Budget Shortfall */}
          {budgetShortfall && <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100 mb-6">
            <h3 className="text-sm font-semibold text-gray-700 mb-3">FY {selectedFY} Budget vs Actuals — Shortfall Analysis</h3>
            <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
              {Object.entries(budgetShortfall).filter(([k])=>k!=="_total").map(([reg,d])=>(
                <div key={reg} className="border border-gray-200 rounded-lg p-4">
                  <div className="text-sm font-semibold text-gray-800 mb-2">{reg}</div>
                  <div className="space-y-1 text-xs text-gray-600">
                    <div className="flex justify-between"><span>Budget</span><span className="font-medium">{fmtFull(d.budget)}</span></div>
                    <div className="flex justify-between"><span>Rev Clocked</span><span className="font-medium text-green-600">{fmtFull(d.clocked)}</span></div>
                    <div className="flex justify-between"><span>Backlog (FY)</span><span className="font-medium text-blue-600">{fmtFull(d.backlog)}</span></div>
                    <div className="flex justify-between border-t pt-1 mt-1"><span className="font-semibold">Shortfall</span><span className="font-bold text-red-600">{fmtFull(d.shortfall)}</span></div>
                  </div>
                  <div className="mt-2 w-full bg-gray-100 rounded-full h-2.5">
                    <div className="h-2.5 rounded-full bg-gradient-to-r from-green-400 to-blue-500" style={{width:`${Math.min(100,((d.clocked+d.backlog)/d.budget)*100)}%`}}/>
                  </div>
                  <div className="text-xs text-gray-500 mt-1">{((d.clocked+d.backlog)/d.budget*100).toFixed(0)}% of budget covered</div>
                </div>
              ))}
              {region==="All" && budgetShortfall._total && (
                <div className="border-2 border-gray-300 rounded-lg p-4 bg-gray-50">
                  <div className="text-sm font-semibold text-gray-800 mb-2">TOTAL</div>
                  <div className="space-y-1 text-xs text-gray-600">
                    <div className="flex justify-between"><span>Budget</span><span className="font-medium">{fmtFull(budgetShortfall._total.budget)}</span></div>
                    <div className="flex justify-between"><span>Rev Clocked</span><span className="font-medium text-green-600">{fmtFull(budgetShortfall._total.clocked)}</span></div>
                    <div className="flex justify-between"><span>Backlog (FY)</span><span className="font-medium text-blue-600">{fmtFull(budgetShortfall._total.backlog)}</span></div>
                    <div className="flex justify-between border-t pt-1 mt-1"><span className="font-semibold">Shortfall</span><span className="font-bold text-red-600">{fmtFull(budgetShortfall._total.shortfall)}</span></div>
                  </div>
                  <div className="mt-2 w-full bg-gray-100 rounded-full h-2.5">
                    <div className="h-2.5 rounded-full bg-gradient-to-r from-green-400 to-blue-500" style={{width:`${Math.min(100,((budgetShortfall._total.clocked+budgetShortfall._total.backlog)/budgetShortfall._total.budget)*100)}%`}}/>
                  </div>
                  <div className="text-xs text-gray-500 mt-1">{((budgetShortfall._total.clocked+budgetShortfall._total.backlog)/budgetShortfall._total.budget*100).toFixed(0)}% covered</div>
                </div>
              )}
            </div>
          </div>}

          {/* Revenue trend + Region pie */}
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
            <div className="lg:col-span-2 bg-white rounded-xl p-5 shadow-sm border border-gray-100">
              <h3 className="text-sm font-semibold text-gray-700 mb-4">Monthly Revenue (Stacked by Region){year!=="All"?` — Starting Jan ${year}`:''}</h3>
              <ResponsiveContainer width="100%" height={280}>
                <BarChart data={monthlyByRegion}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#f0f0f0"/>
                  <XAxis dataKey="month" tick={{fontSize:10}} interval={1}/>
                  <YAxis tick={{fontSize:10}} tickFormatter={fmt}/>
                  <Tooltip content={<CT/>}/>
                  <Legend wrapperStyle={{fontSize:12}}/>
                  {regions.map((r,i)=><Bar key={r} dataKey={r} stackId="a" fill={COLORS[i%COLORS.length]} radius={i===regions.length-1?[2,2,0,0]:[0,0,0,0]}/>)}
                </BarChart>
              </ResponsiveContainer>
            </div>
            <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
              <h3 className="text-sm font-semibold text-gray-700 mb-4">Wins by Region</h3>
              <ResponsiveContainer width="100%" height={280}>
                <PieChart>
                  <Pie data={byRegion} dataKey="value" nameKey="name" cx="50%" cy="50%" outerRadius={90} label={({name,percent})=>`${name} ${(percent*100).toFixed(0)}%`} labelLine={false}>
                    {byRegion.map((_,i)=><Cell key={i} fill={COLORS[i%COLORS.length]}/>)}
                  </Pie>
                  <Tooltip formatter={fmtFull}/>
                </PieChart>
              </ResponsiveContainer>
            </div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
            <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
              <h3 className="text-sm font-semibold text-gray-700 mb-4">Wins by Service Offering</h3>
              <ResponsiveContainer width="100%" height={300}>
                <BarChart data={byService.slice(0,10)} layout="vertical">
                  <CartesianGrid strokeDasharray="3 3" stroke="#f0f0f0"/>
                  <XAxis type="number" tickFormatter={fmt} tick={{fontSize:10}}/>
                  <YAxis type="category" dataKey="name" width={140} tick={{fontSize:10}}/>
                  <Tooltip formatter={fmtFull}/>
                  <Bar dataKey="value" fill="#2563eb" radius={[0,4,4,0]} name="Win Value" onClick={(_,idx)=>{const svc=byService[idx]?.name; if(svc){setDrill({title:`Wins: ${svc}`,data:wins.filter(w=>w.service===svc),cols:DRILL_WIN_COLS});}}}/>
                </BarChart>
              </ResponsiveContainer>
            </div>
            <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
              <h3 className="text-sm font-semibold text-gray-700 mb-4">Top 10 Clients by Win Value</h3>
              <ResponsiveContainer width="100%" height={300}>
                <BarChart data={topClients} layout="vertical">
                  <CartesianGrid strokeDasharray="3 3" stroke="#f0f0f0"/>
                  <XAxis type="number" tickFormatter={fmt} tick={{fontSize:10}}/>
                  <YAxis type="category" dataKey="name" width={130} tick={{fontSize:10}}/>
                  <Tooltip formatter={fmtFull}/>
                  <Bar dataKey="value" fill="#10b981" radius={[0,4,4,0]} name="Win Value" onClick={(_,idx)=>{const cl=topClients[idx]?.name; if(cl){setDrill({title:`Wins: ${cl}`,data:wins.filter(w=>w.client===cl),cols:DRILL_WIN_COLS});}}}/>
                </BarChart>
              </ResponsiveContainer>
            </div>
          </div>
        </>}

        {/* ═══════════════ REVENUE ═══════════════ */}
        {view==="Revenue" && <>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <KPI title={`Rev Clocked (${selectedFY})`} value={fmt(revClocked)} sub={`Jan–Apr ${selectedFY}`} color="blue"/>
            <KPI title={`Backlog (${selectedFY})`} value={fmt(backlogCurrentFY)} sub={`May–Dec ${selectedFY}`} color="green"/>
            <KPI title="Peak Month" value={monthlyRev.length?monthlyRev.reduce((a,b)=>b.revenue>a.revenue?b:a).month:'—'} sub={monthlyRev.length?fmt(monthlyRev.reduce((a,b)=>b.revenue>a.revenue?b:a).revenue):'—'} color="amber"/>
            <KPI title={`Full Year ${selectedFY}`} value={fmt(revClocked+backlogCurrentFY)} sub="Clocked + Backlog" color="purple"/>
          </div>

          {budgetShortfall && <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100 mb-6">
            <h3 className="text-sm font-semibold text-gray-700 mb-3">Budget Shortfall — FY {selectedFY}</h3>
            <div className="overflow-auto">
              <table className="w-full text-sm">
                <thead><tr className="bg-gray-50">
                  <th className="text-left py-2 px-3 font-semibold text-gray-600">Region</th>
                  <th className="text-right py-2 px-3 font-semibold text-gray-600">Annual Budget</th>
                  <th className="text-right py-2 px-3 font-semibold text-gray-600">Rev Clocked</th>
                  <th className="text-right py-2 px-3 font-semibold text-gray-600">Backlog (FY)</th>
                  <th className="text-right py-2 px-3 font-semibold text-gray-600">Covered</th>
                  <th className="text-right py-2 px-3 font-semibold text-gray-600">Shortfall</th>
                  <th className="text-right py-2 px-3 font-semibold text-gray-600">Coverage %</th>
                </tr></thead>
                <tbody>
                  {Object.entries(budgetShortfall).filter(([k])=>k!=="_total").map(([reg,d],i)=>(
                    <tr key={reg} className="border-t border-gray-100 hover:bg-blue-50">
                      <td className="py-2 px-3 font-medium">{reg}</td>
                      <td className="py-2 px-3 text-right">{fmtFull(d.budget)}</td>
                      <td className="py-2 px-3 text-right text-green-600">{fmtFull(d.clocked)}</td>
                      <td className="py-2 px-3 text-right text-blue-600">{fmtFull(d.backlog)}</td>
                      <td className="py-2 px-3 text-right">{fmtFull(d.clocked+d.backlog)}</td>
                      <td className="py-2 px-3 text-right font-bold text-red-600">{fmtFull(d.shortfall)}</td>
                      <td className="py-2 px-3 text-right">{((d.clocked+d.backlog)/d.budget*100).toFixed(0)}%</td>
                    </tr>
                  ))}
                  {budgetShortfall._total && <tr className="border-t-2 border-gray-300 bg-gray-50 font-semibold">
                    <td className="py-2 px-3">TOTAL</td>
                    <td className="py-2 px-3 text-right">{fmtFull(budgetShortfall._total.budget)}</td>
                    <td className="py-2 px-3 text-right text-green-600">{fmtFull(budgetShortfall._total.clocked)}</td>
                    <td className="py-2 px-3 text-right text-blue-600">{fmtFull(budgetShortfall._total.backlog)}</td>
                    <td className="py-2 px-3 text-right">{fmtFull(budgetShortfall._total.clocked+budgetShortfall._total.backlog)}</td>
                    <td className="py-2 px-3 text-right font-bold text-red-600">{fmtFull(budgetShortfall._total.shortfall)}</td>
                    <td className="py-2 px-3 text-right">{((budgetShortfall._total.clocked+budgetShortfall._total.backlog)/budgetShortfall._total.budget*100).toFixed(0)}%</td>
                  </tr>}
                </tbody>
              </table>
            </div>
          </div>}

          <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100 mb-6">
            <h3 className="text-sm font-semibold text-gray-700 mb-4">Revenue Trend — Month on Month{year!=="All"?` (from Jan ${year})`:''}</h3>
            <ResponsiveContainer width="100%" height={320}>
              <LineChart data={monthlyRev}>
                <CartesianGrid strokeDasharray="3 3" stroke="#f0f0f0"/>
                <XAxis dataKey="month" tick={{fontSize:10}} interval={1}/>
                <YAxis tick={{fontSize:10}} tickFormatter={fmt}/>
                <Tooltip content={<CT/>}/>
                <Line type="monotone" dataKey="revenue" stroke="#2563eb" strokeWidth={2.5} dot={{r:3}} name="Revenue"/>
              </LineChart>
            </ResponsiveContainer>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
            <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
              <h3 className="text-sm font-semibold text-gray-700 mb-4">Revenue by Region (Stacked)</h3>
              <ResponsiveContainer width="100%" height={300}>
                <BarChart data={monthlyByRegion}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#f0f0f0"/>
                  <XAxis dataKey="month" tick={{fontSize:9}} interval={2}/>
                  <YAxis tick={{fontSize:10}} tickFormatter={fmt}/>
                  <Tooltip content={<CT/>}/>
                  <Legend wrapperStyle={{fontSize:11}}/>
                  {regions.map((r,i)=><Bar key={r} dataKey={r} stackId="a" fill={COLORS[i%COLORS.length]}/>)}
                </BarChart>
              </ResponsiveContainer>
            </div>
            <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
              <h3 className="text-sm font-semibold text-gray-700 mb-4">Revenue by Service (Pie)</h3>
              <ResponsiveContainer width="100%" height={300}>
                <PieChart>
                  <Pie data={byService.filter(d=>d.value>0)} dataKey="value" nameKey="name" cx="50%" cy="50%" outerRadius={100} label={({name,percent})=>percent>0.05?`${name.slice(0,15)} ${(percent*100).toFixed(0)}%`:''}>
                    {byService.map((_,i)=><Cell key={i} fill={COLORS[i%COLORS.length]}/>)}
                  </Pie>
                  <Tooltip formatter={fmtFull}/>
                </PieChart>
              </ResponsiveContainer>
            </div>
          </div>

          <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
            <h3 className="text-sm font-semibold text-gray-700 mb-4">Revenue by Primary FT SPOC</h3>
            <div className="overflow-auto">
              <table className="w-full text-sm">
                <thead><tr className="bg-gray-50"><th className="text-left py-2 px-3 font-semibold text-gray-600">SPOC</th><th className="text-right py-2 px-3 font-semibold text-gray-600">Total Wins</th><th className="text-right py-2 px-3 font-semibold text-gray-600">Rev Clocked ({selectedFY})</th><th className="text-right py-2 px-3 font-semibold text-gray-600">Backlog ({selectedFY})</th><th className="text-right py-2 px-3 font-semibold text-gray-600">Deals</th></tr></thead>
                <tbody>{bySPOC.map((s,i)=><tr key={i} className="border-t border-gray-100 hover:bg-blue-50 cursor-pointer" onClick={()=>{if(s.name!=="Unassigned"){setSpoc(s.name);} setView("Deals");}}>
                  <td className="py-2 px-3 font-medium text-gray-800">{s.name}</td>
                  <td className="py-2 px-3 text-right">{fmtFull(s.wins)}</td>
                  <td className="py-2 px-3 text-right text-green-600">{fmtFull(s.rev)}</td>
                  <td className="py-2 px-3 text-right text-blue-600">{fmtFull(s.backlog)}</td>
                  <td className="py-2 px-3 text-right">{s.deals}</td>
                </tr>)}</tbody>
              </table>
            </div>
          </div>
        </>}

        {/* ═══════════════ PIPELINE ═══════════════ */}
        {view==="Pipeline" && <>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <KPI title="Total Pipeline (Gross)" value={fmt(pipeline.reduce((s,p)=>s+p.oppUSD,0))} sub={`${pipeline.length} opps`} color="blue"/>
            <KPI title="Active Pipeline" value={fmt(grossPipeline)} sub={`${activePipeline.length} active`} color="green" onClick={()=>setDrill({title:"Active Pipeline",data:activePipeline,cols:DRILL_PIPE_COLS})}/>
            <KPI title="Weighted Value" value={fmt(weightedPipeline)} color="purple"/>
            <KPI title="Proposals Pending" value={proposalCount} sub={fmt(activePipeline.filter(p=>p.stage==="Proposal Shared").reduce((s,p)=>s+p.oppUSD,0))} color="amber" onClick={()=>setDrill({title:"Proposals Shared",data:activePipeline.filter(p=>p.stage==="Proposal Shared"),cols:DRILL_PIPE_COLS})}/>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
            <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
              <h3 className="text-sm font-semibold text-gray-700 mb-4">Pipeline by Stage</h3>
              <ResponsiveContainer width="100%" height={300}>
                <BarChart data={pipeByStage}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#f0f0f0"/>
                  <XAxis dataKey="stage" tick={{fontSize:9}}/>
                  <YAxis tick={{fontSize:10}} tickFormatter={fmt}/>
                  <Tooltip content={<CT/>}/>
                  <Legend wrapperStyle={{fontSize:11}}/>
                  <Bar dataKey="gross" fill="#f59e0b" name="Gross Value" radius={[4,4,0,0]} onClick={(_,idx)=>{const st=pipeByStage[idx]?.stage; if(st) setDrill({title:`Pipeline: ${st}`,data:pipeline.filter(p=>p.stage===st),cols:DRILL_PIPE_COLS});}}/>
                  <Bar dataKey="weighted" fill="#8b5cf6" name="Weighted Value" radius={[4,4,0,0]}/>
                </BarChart>
              </ResponsiveContainer>
            </div>
            <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
              <h3 className="text-sm font-semibold text-gray-700 mb-4">Active Pipeline by Service (Weighted)</h3>
              <ResponsiveContainer width="100%" height={300}>
                <BarChart data={pipeByService} layout="vertical">
                  <CartesianGrid strokeDasharray="3 3" stroke="#f0f0f0"/>
                  <XAxis type="number" tickFormatter={fmt} tick={{fontSize:10}}/>
                  <YAxis type="category" dataKey="name" width={160} tick={{fontSize:10}}/>
                  <Tooltip formatter={fmtFull}/>
                  <Bar dataKey="value" fill="#8b5cf6" radius={[0,4,4,0]} name="Weighted Pipeline" onClick={(_,idx)=>{const svc=pipeByService[idx]?.name; if(svc) setDrill({title:`Pipeline: ${svc}`,data:activePipeline.filter(p=>p.service===svc),cols:DRILL_PIPE_COLS});}}/>
                </BarChart>
              </ResponsiveContainer>
            </div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
            <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
              <h3 className="text-sm font-semibold text-gray-700 mb-4">Active Pipeline by Region</h3>
              <ResponsiveContainer width="100%" height={250}>
                <PieChart>
                  <Pie data={(() => { const m={}; activePipeline.forEach(p=>{m[p.region]=(m[p.region]||0)+p.weightedUSD;}); return Object.entries(m).map(([name,value])=>({name,value:Math.round(value)})).filter(d=>d.value>0); })()} dataKey="value" nameKey="name" cx="50%" cy="50%" outerRadius={85} label={({name,percent})=>`${name} ${(percent*100).toFixed(0)}%`}>
                    {regions.map((_,i)=><Cell key={i} fill={COLORS[i%COLORS.length]}/>)}
                  </Pie>
                  <Tooltip formatter={fmtFull}/>
                </PieChart>
              </ResponsiveContainer>
            </div>
            <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
              <h3 className="text-sm font-semibold text-gray-700 mb-4">Stage Distribution</h3>
              <div className="space-y-3 mt-2">
                {pipeByStage.map((s,i) => {
                  const maxCount = Math.max(...pipeByStage.map(x=>x.count));
                  return (
                    <div key={i} className="cursor-pointer hover:bg-gray-50 rounded p-2" onClick={()=>setDrill({title:`Pipeline: ${s.stage}`,data:pipeline.filter(p=>p.stage===s.stage),cols:DRILL_PIPE_COLS})}>
                      <div className="flex justify-between text-sm mb-1"><span className="font-medium text-gray-700">{s.stage}</span><span className="text-gray-500">{s.count} opps · {fmt(s.gross)}</span></div>
                      <div className="w-full bg-gray-100 rounded-full h-2"><div className="h-2 rounded-full" style={{width:`${(s.count/maxCount)*100}%`,background:COLORS[i%COLORS.length]}}/></div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        </>}

        {/* ═══════════════ PEOPLE ═══════════════ */}
        {view==="People" && <>
          <div className="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6">
            <KPI title="Top SPOC (Wins)" value={bySPOC.filter(s=>s.name!=="Unassigned")[0]?.name||'—'} sub={fmt(bySPOC.filter(s=>s.name!=="Unassigned")[0]?.wins||0)} color="blue"/>
            <KPI title="Active SPOCs" value={bySPOC.filter(s=>s.name!=="Unassigned"&&s.wins>0).length} color="green"/>
            <KPI title="Unassigned SPOC Wins" value={fmt(wins.filter(w=>w.spoc==="Unassigned").reduce((s,w)=>s+w.winUSD,0))} sub={`${wins.filter(w=>w.spoc==="Unassigned").length} deals`} color="rose" onClick={()=>setDrill({title:"Unassigned SPOC Wins",data:wins.filter(w=>w.spoc==="Unassigned"),cols:DRILL_WIN_COLS})}/>
          </div>

          <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100 mb-6">
            <h3 className="text-sm font-semibold text-gray-700 mb-4">Primary FT SPOC Performance — Wins vs Revenue Clocked vs Backlog</h3>
            <ResponsiveContainer width="100%" height={350}>
              <BarChart data={bySPOC.filter(s=>s.name!=="Unassigned")} layout="vertical">
                <CartesianGrid strokeDasharray="3 3" stroke="#f0f0f0"/>
                <XAxis type="number" tickFormatter={fmt} tick={{fontSize:10}}/>
                <YAxis type="category" dataKey="name" width={100} tick={{fontSize:11}}/>
                <Tooltip content={<CT/>}/>
                <Legend wrapperStyle={{fontSize:11}}/>
                <Bar dataKey="wins" fill="#2563eb" name="Total Wins" radius={[0,2,2,0]}/>
                <Bar dataKey="rev" fill="#10b981" name={`Rev Clocked (${selectedFY})`} radius={[0,2,2,0]}/>
                <Bar dataKey="backlog" fill="#f59e0b" name={`Backlog (${selectedFY})`} radius={[0,2,2,0]}/>
              </BarChart>
            </ResponsiveContainer>
          </div>

          <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100 mb-6">
            <h3 className="text-sm font-semibold text-gray-700 mb-4">Primary FT SPOC Detail</h3>
            <div className="overflow-auto">
              <table className="w-full text-sm">
                <thead><tr className="bg-gray-50">
                  <th className="text-left py-2 px-3 font-semibold text-gray-600">SPOC</th>
                  <th className="text-right py-2 px-3 font-semibold text-gray-600">Total Wins</th>
                  <th className="text-right py-2 px-3 font-semibold text-gray-600">Deals</th>
                  <th className="text-right py-2 px-3 font-semibold text-gray-600">Rev Clocked</th>
                  <th className="text-right py-2 px-3 font-semibold text-gray-600">Backlog</th>
                </tr></thead>
                <tbody>{bySPOC.map((s,i)=><tr key={i} className="border-t border-gray-100 hover:bg-blue-50 cursor-pointer" onClick={()=>{
                  const deals = wins.filter(w=>w.spoc===s.name).map(w=>{
                    let rc=0,bl=0; Object.entries(w.monthly).forEach(([mo,v])=>{const p=parseMo(mo);if(p.year===selectedFY&&p.month<=NOW_MONTH)rc+=v;if(p.year===selectedFY&&p.month>NOW_MONTH)bl+=v;});
                    return {...w,revClocked:rc,backlog:bl};
                  });
                  setDrill({title:`SPOC: ${s.name} — Deals`,data:deals,cols:[...DRILL_WIN_COLS,{key:"revClocked",label:`Rev Clocked (${selectedFY})`,fmt:fmtFull},{key:"backlog",label:`Backlog (${selectedFY})`,fmt:fmtFull}]});
                }}>
                  <td className="py-2 px-3 font-medium text-gray-800">{s.name}</td>
                  <td className="py-2 px-3 text-right">{fmtFull(s.wins)}</td>
                  <td className="py-2 px-3 text-right">{s.deals}</td>
                  <td className="py-2 px-3 text-right text-green-600">{fmtFull(s.rev)}</td>
                  <td className="py-2 px-3 text-right text-blue-600">{fmtFull(s.backlog)}</td>
                </tr>)}</tbody>
              </table>
            </div>
          </div>

          <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
            <h3 className="text-sm font-semibold text-gray-700 mb-4">Engagement Partner — Wins + Active Pipeline</h3>
            <div className="overflow-auto">
              <table className="w-full text-sm">
                <thead><tr className="bg-gray-50">
                  <th className="text-left py-2 px-3 font-semibold text-gray-600">Partner</th>
                  <th className="text-right py-2 px-3 font-semibold text-gray-600">Wins (USD)</th>
                  <th className="text-right py-2 px-3 font-semibold text-gray-600">Deals Won</th>
                  <th className="text-right py-2 px-3 font-semibold text-gray-600">Active Pipe (Gross)</th>
                  <th className="text-right py-2 px-3 font-semibold text-gray-600">Active Pipe (Wtd)</th>
                  <th className="text-right py-2 px-3 font-semibold text-gray-600">Total (Wins+Wtd)</th>
                </tr></thead>
                <tbody>{byPartner.filter(p=>p.wins>0||p.pipeGross>0).map((p,i)=><tr key={i} className="border-t border-gray-100 hover:bg-blue-50 cursor-pointer" onClick={()=>{
                  const pWins = wins.filter(w=>w.partner.includes(p.name));
                  const pPipe = activePipeline.filter(pp=>pp.partner.includes(p.name));
                  setDrill({title:`Partner: ${p.name}`,data:[...pWins.map(w=>({...w,type:'Win',stage:'Won'})),...pPipe.map(pp=>({...pp,type:'Pipeline',winUSD:pp.oppUSD,winDate:pp.oppDate}))],cols:[{key:"type",label:"Type"},{key:"client",label:"Client"},{key:"desc",label:"Description"},{key:"service",label:"Service"},{key:"winUSD",label:"Value (USD)",fmt:fmtFull},{key:"stage",label:"Stage"},{key:"region",label:"Region"},{key:"spoc",label:"SPOC"}]});
                }}>
                  <td className="py-2 px-3 font-medium text-gray-800">{p.name}</td>
                  <td className="py-2 px-3 text-right">{fmtFull(p.wins)}</td>
                  <td className="py-2 px-3 text-right">{p.deals}</td>
                  <td className="py-2 px-3 text-right">{fmtFull(p.pipeGross)}</td>
                  <td className="py-2 px-3 text-right">{fmtFull(p.pipeWeighted)}</td>
                  <td className="py-2 px-3 text-right font-semibold text-blue-600">{fmtFull(p.wins+p.pipeWeighted)}</td>
                </tr>)}</tbody>
              </table>
            </div>
          </div>
        </>}

        {/* ═══════════════ DEALS ═══════════════ */}
        {view==="Deals" && <>
          <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100 mb-6">
            <h3 className="text-sm font-semibold text-gray-700 mb-4">Won Deals ({wins.length})</h3>
            <div className="overflow-auto max-h-[50vh]">
              <table className="w-full text-sm">
                <thead className="sticky top-0"><tr className="bg-gray-50">
                  <th className="text-left py-2 px-3 font-semibold text-gray-600">Client</th>
                  <th className="text-left py-2 px-3 font-semibold text-gray-600">Description</th>
                  <th className="text-left py-2 px-3 font-semibold text-gray-600">Service</th>
                  <th className="text-right py-2 px-3 font-semibold text-gray-600">Win Size (USD)</th>
                  <th className="text-left py-2 px-3 font-semibold text-gray-600">Region</th>
                  <th className="text-left py-2 px-3 font-semibold text-gray-600">Location</th>
                  <th className="text-left py-2 px-3 font-semibold text-gray-600">Primary FT SPOC</th>
                  <th className="text-left py-2 px-3 font-semibold text-gray-600">Partner</th>
                  <th className="text-left py-2 px-3 font-semibold text-gray-600">Win Date</th>
                  <th className="text-center py-2 px-3 font-semibold text-gray-600">Year</th>
                </tr></thead>
                <tbody>{[...wins].sort((a,b)=>b.winUSD-a.winUSD).map((w,i)=><tr key={i} className="border-t border-gray-100 hover:bg-blue-50 cursor-pointer" onClick={()=>{
                  const rc=[]; let tot=0; Object.entries(w.monthly).forEach(([mo,v])=>{rc.push({month:mo,revenue:v});tot+=v;});
                  rc.push({month:'TOTAL',revenue:tot});
                  setDrill({title:`${w.client} — ${w.desc||w.service} — Monthly Revenue`,data:rc,cols:[{key:"month",label:"Month"},{key:"revenue",label:"Revenue (USD)",fmt:v=>fmtFull(v)}]});
                }}>
                  <td className="py-2 px-3 font-medium text-gray-800 whitespace-nowrap">{w.client}</td>
                  <td className="py-2 px-3 text-gray-600 max-w-xs truncate" title={w.desc}>{w.desc||'—'}</td>
                  <td className="py-2 px-3 text-gray-600 whitespace-nowrap">{w.service}</td>
                  <td className="py-2 px-3 text-right font-medium whitespace-nowrap">{fmtFull(w.winUSD)}</td>
                  <td className="py-2 px-3"><span className={`px-2 py-0.5 rounded-full text-xs font-medium ${w.region==='ME'?'bg-amber-100 text-amber-700':w.region==='India'?'bg-blue-100 text-blue-700':'bg-green-100 text-green-700'}`}>{w.region}</span></td>
                  <td className="py-2 px-3 text-gray-600 whitespace-nowrap">{w.location}</td>
                  <td className="py-2 px-3 text-gray-600 whitespace-nowrap">{w.spoc}</td>
                  <td className="py-2 px-3 text-gray-600 whitespace-nowrap">{w.partner}</td>
                  <td className="py-2 px-3 text-gray-600 whitespace-nowrap">{w.winDate||'—'}</td>
                  <td className="py-2 px-3 text-center">{w.year}</td>
                </tr>)}</tbody>
              </table>
            </div>
          </div>

          <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
            <h3 className="text-sm font-semibold text-gray-700 mb-4">Active Pipeline ({activePipeline.length})</h3>
            <div className="overflow-auto max-h-[50vh]">
              <table className="w-full text-sm">
                <thead className="sticky top-0"><tr className="bg-gray-50">
                  <th className="text-left py-2 px-3 font-semibold text-gray-600">Client</th>
                  <th className="text-left py-2 px-3 font-semibold text-gray-600">Description</th>
                  <th className="text-left py-2 px-3 font-semibold text-gray-600">Service</th>
                  <th className="text-left py-2 px-3 font-semibold text-gray-600">Stage</th>
                  <th className="text-right py-2 px-3 font-semibold text-gray-600">Opp Size (USD)</th>
                  <th className="text-right py-2 px-3 font-semibold text-gray-600">Prob</th>
                  <th className="text-right py-2 px-3 font-semibold text-gray-600">Weighted (USD)</th>
                  <th className="text-left py-2 px-3 font-semibold text-gray-600">Region</th>
                  <th className="text-left py-2 px-3 font-semibold text-gray-600">Location</th>
                  <th className="text-left py-2 px-3 font-semibold text-gray-600">Primary FT SPOC</th>
                  <th className="text-left py-2 px-3 font-semibold text-gray-600">Partner</th>
                  <th className="text-left py-2 px-3 font-semibold text-gray-600">Opp Date</th>
                </tr></thead>
                <tbody>{[...activePipeline].sort((a,b)=>b.oppUSD-a.oppUSD).map((p,i)=><tr key={i} className="border-t border-gray-100 hover:bg-blue-50">
                  <td className="py-2 px-3 font-medium text-gray-800 whitespace-nowrap">{p.client}</td>
                  <td className="py-2 px-3 text-gray-600 max-w-xs truncate" title={p.desc}>{p.desc||'—'}</td>
                  <td className="py-2 px-3 text-gray-600 whitespace-nowrap">{p.service}</td>
                  <td className="py-2 px-3"><span className={`px-2 py-0.5 rounded-full text-xs font-medium ${p.stage==='Proposal Shared'?'bg-purple-100 text-purple-700':'bg-gray-100 text-gray-600'}`}>{p.stage}</span></td>
                  <td className="py-2 px-3 text-right font-medium whitespace-nowrap">{fmtFull(p.oppUSD)}</td>
                  <td className="py-2 px-3 text-right">{p.prob?`${(p.prob*100).toFixed(0)}%`:'—'}</td>
                  <td className="py-2 px-3 text-right whitespace-nowrap">{fmtFull(p.weightedUSD)}</td>
                  <td className="py-2 px-3"><span className={`px-2 py-0.5 rounded-full text-xs font-medium ${p.region==='ME'?'bg-amber-100 text-amber-700':p.region==='India'?'bg-blue-100 text-blue-700':'bg-green-100 text-green-700'}`}>{p.region}</span></td>
                  <td className="py-2 px-3 text-gray-600 whitespace-nowrap">{p.location}</td>
                  <td className="py-2 px-3 text-gray-600 whitespace-nowrap">{p.spoc}</td>
                  <td className="py-2 px-3 text-gray-600 whitespace-nowrap">{p.partner}</td>
                  <td className="py-2 px-3 text-gray-600 whitespace-nowrap">{p.oppDate||'—'}</td>
                </tr>)}</tbody>
              </table>
            </div>
          </div>
        </>}
      </div>

      {drill && <DrillModal {...drill} onClose={()=>setDrill(null)}/>}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Dashboard />);
  </script>
</body>
</html>
